# Dependabot — automated dependency bumps.
# Patch/minor PRs are auto-merged once CI passes (see
# .github/workflows/dependabot-auto-merge.yml). Major bumps stay manual.
version: 2
updates:
  - package-ecosystem: npm # also covers the pnpm-lock.yaml
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # TypeScript 7 is the native (Go) compiler rewrite; Next 16's `next build`
      # type-check can't load it yet, so a 6→7 bump fails every build. Hold at 6.x
      # until Next supports it — drop this entry to let the bump back in.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    groups:
      # One PR per week for the low-risk bumps, instead of N separate PRs.
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels: ["dependencies", "github-actions"]
    commit-message:
      prefix: "chore(ci)"
